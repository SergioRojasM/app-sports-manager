<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "accent": "#00E5C4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0d121f",
                        "surface-dark": "#161d2e",
                        "border-dark": "#2a3447"
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="max-w-6xl mx-auto p-6 space-y-8">
<!-- Header Section -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-6 border-b border-border-dark">
<div class="space-y-1">
<h1 class="text-3xl font-bold tracking-tight text-slate-100">Sports Disciplines</h1>
<p class="text-slate-400">Configure and manage athletic training categories for qbop.</p>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
                Add Discipline
            </button>
</div>
</div>
<!-- Stats/Quick Overview -->

<!-- View Toggle/Tabs -->
<div class="flex border-b border-border-dark px-2 gap-8">
<button class="flex items-center gap-2 border-b-2 border-primary pb-3 text-primary font-bold text-sm">
<span class="material-symbols-outlined text-[18px]">list</span> Active Disciplines
        </button>
<button class="flex items-center gap-2 border-b-2 border-transparent pb-3 text-slate-400 font-bold text-sm hover:text-slate-300">
<span class="material-symbols-outlined text-[18px]">history</span> History
        </button>
</div>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- List View (Left/Main) -->
<div class="space-y-4 lg:col-span-12">
<div class="bg-surface-dark rounded-xl border border-border-dark overflow-hidden">
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-slate-800/50">
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Discipline</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Category</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Status</th>
<th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400 text-right">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-border-dark">
<tr class="hover:bg-slate-800/30 transition-colors">
<td class="px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">sports_basketball</span>
</div>
<span class="font-medium text-slate-100">Basketball</span>
</div>
</td>
<td class="px-6 py-4">
<span class="px-3 py-1 bg-slate-700/50 rounded-full text-xs font-medium text-slate-300">Team</span>
</td>
<td class="px-6 py-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-accent"></span>
<span class="text-sm text-slate-300">Active</span>
</div>
</td>
<td class="px-6 py-4 text-right">
<div class="flex justify-end gap-2">
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
<tr class="hover:bg-slate-800/30 transition-colors">
<td class="px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-accent/20 flex items-center justify-center text-accent">
<span class="material-symbols-outlined">sports_tennis</span>
</div>
<span class="font-medium text-slate-100">Tennis</span>
</div>
</td>
<td class="px-6 py-4">
<span class="px-3 py-1 bg-slate-700/50 rounded-full text-xs font-medium text-slate-300">Individual</span>
</td>
<td class="px-6 py-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-accent"></span>
<span class="text-sm text-slate-300">Active</span>
</div>
</td>
<td class="px-6 py-4 text-right">
<div class="flex justify-end gap-2">
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
<tr class="hover:bg-slate-800/30 transition-colors">
<td class="px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-slate-700/50 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined">pool</span>
</div>
<span class="font-medium text-slate-100">Swimming</span>
</div>
</td>
<td class="px-6 py-4">
<span class="px-3 py-1 bg-slate-700/50 rounded-full text-xs font-medium text-slate-300">Individual</span>
</td>
<td class="px-6 py-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-slate-600"></span>
<span class="text-sm text-slate-500">Inactive</span>
</div>
</td>
<td class="px-6 py-4 text-right">
<div class="flex justify-end gap-2">
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
<!-- Add/Edit Form (Right/Side) -->

</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-accent/5 blur-[100px] rounded-full pointer-events-none"></div>
</div>
</body></html>
